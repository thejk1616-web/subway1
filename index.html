<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JK_DINO - Cyber Dinosaur</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: #060913;
            color: #ffffff;
            font-family: 'Segoe UI', Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }
        #score-board {
            font-size: 28px;
            font-weight: 900;
            color: #00f2fe;
            margin-bottom: 15px;
            text-shadow: 0 0 15px #00f2fe;
            letter-spacing: 2px;
        }
        
        /* High Quality Cyberpunk Game Field */
        #game-container {
            position: relative;
            width: 92vw;
            max-width: 440px;
            height: 320px;
            background: linear-gradient(180deg, #0b132b 0%, #060913 100%);
            border: 2px solid rgba(0, 242, 254, 0.3);
            border-bottom: 6px solid #00f2fe; /* Glowing Ground */
            overflow: hidden;
            border-radius: 16px;
            box-shadow: 0 0 30px rgba(0, 242, 254, 0.15);
        }
        
        /* Neon Dinosaur */
        #player {
            position: absolute;
            bottom: 0;
            left: 40px;
            font-size: 38px;
            width: 45px;
            height: 45px;
            display: flex;
            justify-content: center;
            align-items: center;
            filter: drop-shadow(0 0 8px #00f2fe);
            z-index: 5;
        }

        /* Obstacles Style */
        .obstacle {
            position: absolute;
            font-size: 30px;
            display: flex;
            justify-content: center;
            align-items: center;
            filter: drop-shadow(0 0 8px #ff7b72);
        }

        /* UI Screens */
        #game-over-screen {
            display: none;
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(6, 9, 19, 0.95);
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }
        .restart-btn {
            background: linear-gradient(135deg, #ff7b72, #ff443a);
            color: white;
            border: none;
            padding: 14px 30px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 10px;
            margin-top: 20px;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(255, 123, 114, 0.4);
            transition: 0.2s;
        }
        .restart-btn:active {
            transform: scale(0.95);
        }
        #instructions {
            margin-top: 20px;
            color: #475569;
            font-weight: bold;
            font-size: 14px;
            text-align: center;
            line-height: 1.6;
        }
        .highlight { color: #ff7b72; }
        .highlight-blue { color: #00f2fe; }
    </style>
</head>
<body>

    <div id="score-board">SCORE: <span id="score">0</span></div>
    
    <div id="game-container" onclick="jump()">
        <div id="player">🦕</div>
        
        <div id="game-over-screen">
