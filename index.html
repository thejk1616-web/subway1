<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chrome Dino Game</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: #f7f7f7; /* የChrome ነጭ ገጽ */
            color: #535353;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }
        #score-board {
            font-size: 20px;
            font-family: 'Courier New', Courier, monospace;
            font-weight: bold;
            margin-bottom: 10px;
            align-self: flex-end;
            max-width: 400px;
            width: 90vw;
            text-align: right;
        }
        /* የChrome ስታይል ሜዳ */
        #game-container {
            position: relative;
            width: 90vw;
            max-width: 400px;
            height: 200px;
            background-color: #f7f7f7;
            border-bottom: 2px solid #535353; /* መሬት መስመር */
            overflow: hidden;
        }
        /* ዳይኖሰር 🦕 */
        #player {
            position: absolute;
            bottom: 0;
            left: 30px;
            font-size: 30px;
            width: 35px;
            height: 35px;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 5;
        }
        /* እንቅፋቶች (Cactus ወይም Bird) */
        .obstacle {
            position: absolute;
            font-size: 26px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        /* Game Over ገጽ */
        #game-over-screen {
            display: none;
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(247, 247, 247, 0.8);
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }
        #game-over-text {
            font-family: 'Courier New', Courier, monospace;
            font-size: 24px;
            font-weight: bold;
            letter-spacing: 3px;
            margin-bottom: 15px;
        }
        .restart-btn {
            background: none;
            border: none;
            font-size: 35px;
            cursor: pointer;
            color: #535353;
        }
    </style>
</head>

        </div>
    </div>
